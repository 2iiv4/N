<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title> Crime </title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════
   TOKENS
════════════════════════════════════════ */
:root{
  --black:   #0a0a0a;
  --ink:     #111111;
  --red:     #c8000a;
  --white:   #f5f5f5;
  --muted:   #888;
  --border:  #2a2a2a;
  --card-r:  20px;
  --nav-h:   68px;
  --ease:    cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  position:fixed;
  touch-action:none;
  background:var(--black);
  font-family:'Barlow Condensed',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

/* ════════════════════════════════════════
   MAP LAYER
════════════════════════════════════════ */
#map-layer{
  position:fixed;inset:0;z-index:1;
  touch-action:none;
  background:#1c1c1c;
  overflow:hidden;
  cursor:grab;
}
#map-layer:active{ cursor:grabbing; }
#map-placeholder{
  display:block;
  position:absolute;
  transform-origin:0 0;
  touch-action:none;
  user-select:none;
  filter:blur(8px);
  transition:opacity .35s ease;
  width:3392px;
  height:4178px;
}
#map-image{
  display:block;
  position:absolute;
  transform-origin:0 0;
  touch-action:none;
  user-select:none;
  opacity:0;
  transition:opacity .35s ease;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
  width:3392px;
  height:4178px;
}
#map-image.loaded{ opacity:1; }
#pdf-loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:#555;font-family:'Barlow Condensed',sans-serif;
  font-size:16px;letter-spacing:2px;text-transform:uppercase;
}

/* ════════════════════════════════════════
   LOGO — always visible top-left
════════════════════════════════════════ */
#logo{
  position:fixed;top:0;left:0;z-index:5;
  padding:14px 16px;
  pointer-events:none;
  line-height:1;
}
#logo .l1{
  font-family:'Anton',sans-serif;
  color:var(--white);font-size:24px;
  letter-spacing:.5px;
  text-shadow:1px 1px 0 #000,2px 2px 6px rgba(0,0,0,.8);
}
#logo .l2{
  font-family:'Anton',sans-serif;
  color:var(--red);font-size:14px;letter-spacing:2px;
  margin-top:1px;
}

/* ════════════════════════════════════════
   CARDS OVERLAY
════════════════════════════════════════ */
#cards-screen{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  opacity:0;pointer-events:none;
  transition:opacity .3s var(--ease);
}
#cards-screen.visible{opacity:1;pointer-events:auto}

/* frosted-dark backdrop */
#cards-screen::before{
  content:'';position:absolute;inset:0;
  background:rgba(8,8,8,.78);
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  pointer-events:none;
}

/* ── next-card hint style ── */
.next-hint{
  font-size:13px;line-height:1.6;color:#666;
  letter-spacing:.3px;
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}

/* ════════════════════════════════════════
   CAROUSEL TRACK
════════════════════════════════════════ */
#carousel-track{
  position:relative;z-index:1;
  width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:0;
  touch-action:pan-y;
  user-select:none;
  height:70vh;
  max-height:520px;
}

/* card slots */
.c-slot{
  position:absolute;
  --cw: min(62vw, 260px);
  width:var(--cw);
  height:100%;
  transition:transform .38s var(--ease), opacity .38s var(--ease), filter .38s var(--ease);
  cursor:pointer;
  will-change:transform,opacity;
}
@media (max-width:600px){
  #carousel-track{ height:60vh; max-height:440px; }
  .c-slot{ --cw: min(54vw, 230px); }
}
.c-slot.pos-center{
  transform:translateX(0) scale(1);
  opacity:1;filter:none;
  cursor:default;
  z-index:3;
}
.c-slot.pos-left{
  transform:translateX(calc(-1 * var(--cw) * .72)) scale(.82);
  opacity:.45;filter:brightness(.5);
  z-index:2;
}
.c-slot.pos-right{
  transform:translateX(calc(var(--cw) * .72)) scale(.82);
  opacity:.45;filter:brightness(.5);
  z-index:2;
}
.c-slot.pos-far-left{
  transform:translateX(calc(-1 * var(--cw) * 1.3)) scale(.7);
  opacity:0;pointer-events:none;
  z-index:1;
}
.c-slot.pos-far-right{
  transform:translateX(calc(var(--cw) * 1.3)) scale(.7);
  opacity:0;pointer-events:none;
  z-index:1;
}

/* ════════════════════════════════════════
   CARD SHELL
════════════════════════════════════════ */
.card{
  width:100%;height:100%;
  border-radius:var(--card-r);
  border:5px solid var(--white);
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  background:var(--ink);
  position:relative;
}

/* ── badge (num + magnifier) ── */
.card-badge{
  position:absolute;top:12px;right:12px;z-index:4;
  background:var(--white);color:var(--ink);
  font-weight:700;font-size:12px;letter-spacing:.5px;
  padding:3px 9px;border-radius:5px;
  display:flex;align-items:center;gap:5px;
  pointer-events:none;
  direction:ltr;
}
.badge-icon{display:inline-flex;align-items:center;flex-shrink:0}

/* ── QUESTION text ── */
.q-text{
  font-family:'Anton',sans-serif;
  font-size:clamp(20px,6vw,30px);
  line-height:1.08;text-transform:uppercase;
  color:var(--white);
  font-style:italic;
  letter-spacing:.5px;
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}
.q-tap-hint{
  margin-top:14px;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:#3a3a3a;
  direction:ltr;
}

/* ── shared image slot (top of every card) ── */
.card-img{
  width:100%;aspect-ratio:4/3;flex-shrink:0;
  background:#f0f0f0;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.card-img.full{
  aspect-ratio:auto;flex:1;height:100%;
}
.card-img.full img{ object-fit:contain; }
.card-img.dark{background:#1a1a1a}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-img .scene-emoji{font-size:56px;line-height:1}
.card-img .img-icon{color:#999;opacity:.4}
.card-img .img-icon.light{color:#777;opacity:.45}

/* SOLVED stamp */
.solved-stamp{
  position:absolute;bottom:8px;right:8px;
  font-family:'Anton',sans-serif;font-size:24px;
  color:var(--red);border:3px solid var(--red);
  padding:1px 6px;border-radius:3px;
  transform:rotate(-9deg);
  background:rgba(255,255,255,.12);
  letter-spacing:1px;
  direction:ltr;
}

/* ── shared text pane (bottom of every card) ── */
.card-text{
  flex:1;display:flex;flex-direction:column;
  padding:14px 16px 16px;
  background:var(--ink);color:var(--white);
  overflow:hidden;
}
.card-text.center{align-items:center;justify-content:center;text-align:center}
.card-text.light{background:var(--white);color:var(--ink)}
.card-text.with-btn{padding-bottom:68px}

/* ── INTRO text ── */
.intro-title{
  font-family:'Anton',sans-serif;
  font-size:20px;text-transform:uppercase;
  text-decoration:underline;text-underline-offset:3px;
  margin-bottom:8px;color:var(--ink);
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}
.intro-desc{
  font-size:13px;line-height:1.55;color:#2a2a2a;
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}

/* ── SOLVED text ── */
.solved-title{
  font-family:'Anton',sans-serif;
  font-size:18px;text-transform:uppercase;
  text-decoration:underline;text-underline-offset:3px;
  color:var(--white);margin-bottom:6px;
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}
.solved-desc{
  font-size:12.5px;line-height:1.55;color:#bbb;
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}

/* ── LOCKED face ── */
.face-locked{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--ink);gap:10px;
}
.lock-icon-big{opacity:.25;color:var(--white);display:flex}
.lock-label{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:#333;
  direction:ltr;
}

/* ── SOLVE button (on unsolved question card) ── */
.solve-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 14px 14px;
  background:linear-gradient(to top,rgba(10,10,10,1) 60%,transparent);
  z-index:3;
}
.solve-bar-btn{
  width:100%;padding:11px;
  background:var(--white);color:var(--ink);
  border:none;border-radius:10px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:14px;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;
  transition:background .15s, transform .1s;
  direction:ltr;
}
.solve-bar-btn:active{transform:scale(.97)}

/* ════════════════════════════════════════
   NAV DOTS
════════════════════════════════════════ */
#nav-strip{
  position:relative;z-index:2;
  margin-top:20px;
  display:flex;align-items:center;justify-content:center;
  gap:9px;padding:0 20px;
  overflow-x:auto;scrollbar-width:none;
  max-width:100vw;
  direction:ltr;
}
#nav-strip::-webkit-scrollbar{display:none}

.ndot{
  flex-shrink:0;
  width:34px;height:34px;border-radius:50%;
  border:2.5px solid #383838;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#383838;
  cursor:pointer;
  transition:all .22s var(--ease);
  position:relative;
}
.ndot:hover:not(.nd-locked){border-color:#777;color:#777;transform:scale(1.1)}
.ndot.nd-active{
  border-color:var(--white);
  box-shadow:0 0 0 3px rgba(255,255,255,.12);
  background:radial-gradient(circle,var(--white) 32%,transparent 37%);
}
.ndot.nd-solved{border-color:#ddd;color:#ddd;font-size:15px}
.ndot.nd-locked{border-color:#222;color:#222;cursor:default}

/* progress bar under dots */
#progress-bar-wrap{
  position:relative;z-index:2;
  margin-top:10px;
  width:min(260px,70vw);
  height:2px;background:rgba(255,255,255,.08);
  border-radius:2px;
}
#progress-bar-fill{
  height:100%;background:var(--red);border-radius:2px;
  transition:width .4s var(--ease);
}

/* ════════════════════════════════════════
   HELP / ? BUTTON
════════════════════════════════════════ */
#help-btn{
  position:fixed;bottom:22px;right:16px;z-index:20;
  width:58px;height:84px;
  background:var(--ink);
  border:3px solid var(--white);border-radius:12px;
  color:var(--white);
  font-family:'Anton',sans-serif;font-size:46px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.65);
  transition:background .18s, border-color .18s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
#help-btn:active{transform:scale(.95)}
body.cards-open #help-btn,
body.cards-open #draw-toolbar,
body.cards-open #color-popup{
  display:none;
}

/* ── DRAW LAYER (canvas overlay on the map) ── */
#draw-canvas{
  position:fixed;inset:0;z-index:4;
  width:100%;height:100%;
  touch-action:none;
  pointer-events:none;
}
#draw-canvas.active{pointer-events:auto}

/* ── DRAW TOOLBAR ── */
#draw-toolbar{
  position:fixed;bottom:22px;left:16px;z-index:20;
  display:flex;flex-direction:column;gap:10px;
  align-items:center;
}
.draw-tool-btn{
  width:50px;height:50px;
  background:var(--ink);
  border:3px solid var(--white);border-radius:12px;
  color:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.65);
  transition:background .18s, border-color .18s, transform .1s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.draw-tool-btn:active{transform:scale(.95)}
.draw-tool-btn.on{border-color:var(--red);background:var(--red)}
#color-dot{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--white);
  background:var(--red);
  pointer-events:none;
}
#color-popup{
  position:absolute;bottom:0;left:62px;
  display:flex;flex-direction:column;gap:8px;
  background:var(--ink);border:2px solid var(--white);
  border-radius:12px;padding:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.65);
  opacity:0;pointer-events:none;transform:translateX(-6px);
  transition:opacity .15s, transform .15s;
}
#color-popup.show{opacity:1;pointer-events:auto;transform:translateX(0)}
.color-swatch{
  width:26px;height:26px;border-radius:50%;
  border:2px solid rgba(255,255,255,.5);
  cursor:pointer;
}
.color-swatch.sel{border-color:var(--white);box-shadow:0 0 0 2px var(--red)}

/* ── close button (top of card overlay) ── */
#close-cards-btn{
  position:fixed;top:14px;right:16px;z-index:30;
  width:42px;height:42px;border-radius:50%;
  background:var(--ink);
  border:2.5px solid var(--white);
  color:var(--white);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,.6);
  transition:background .15s, transform .1s;
  -webkit-tap-highlight-color:transparent;
}
#close-cards-btn:active{transform:scale(.92)}
#close-cards-btn:hover{background:var(--red);border-color:var(--red)}

/* ════════════════════════════════════════
   HINT SHEET
════════════════════════════════════════ */
#hint-overlay{
  position:fixed;inset:0;z-index:40;
  background:rgba(0,0,0,.7);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
}
#hint-overlay.open{opacity:1;pointer-events:auto}
.hint-sheet{
  background:#161616;
  border:1.5px solid var(--border);border-bottom:none;
  border-radius:20px 20px 0 0;
  padding:16px 22px 38px;
  width:100%;max-width:440px;
  transform:translateY(24px);
  transition:transform .32s var(--ease);
}
#hint-overlay.open .hint-sheet{transform:translateY(0)}
.hint-drag{
  width:36px;height:4px;background:#2e2e2e;border-radius:2px;
  margin:0 auto 16px;
}
.hint-head{
  font-family:'Anton',sans-serif;font-size:19px;color:var(--white);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
  direction:rtl;
}
.hint-body-text{
  color:#999;font-size:15px;line-height:1.65;
  direction:rtl;
  text-align:right;
  unicode-bidi:embed;
}
.hint-close{
  margin-top:18px;width:100%;padding:13px;
  background:var(--red);color:var(--white);
  border:none;border-radius:10px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;
  transition:background .15s;
  direction:ltr;
}
.hint-close:hover{background:#a50008}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
#toast{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(10px);
  z-index:50;
  background:rgba(20,20,20,.95);
  border:1px solid #333;
  color:var(--white);
  font-size:13px;letter-spacing:1px;
  padding:10px 20px;border-radius:30px;
  opacity:0;pointer-events:none;
  transition:opacity .2s, transform .2s;
  white-space:nowrap;
  direction:ltr;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════════════════════════════════════════
   ANIMATIONS
════════════════════════════════════════ */
@keyframes cardIn{
  from{opacity:0;transform:translateY(12px) scale(.97)}
  to  {opacity:1;transform:none}
}
.card-enter{animation:cardIn .3s var(--ease) both}

@media(prefers-reduced-motion:reduce){
  *{transition-duration:.01ms!important;animation-duration:.01ms!important}
}
</style>
</head>

const POS = ['pos-far-left','pos-left','pos-center','pos-right','pos-far-right'];

function posClass(offset){
  const o = Math.max(-2, Math.min(2, offset));
  return POS[o + 2];
}

/* ══════════════════════════════════════
   RENDER CAROUSEL
══════════════════════════════════════ */
function renderCarousel(){
  track.innerHTML = '';

  for(let i = Math.max(0, cur-2); i <= Math.min(CASES.length-1, cur+2); i++){
    const c = CASES[i];
    const offset = i - cur;
    const slot = document.createElement('div');
    slot.className = 'c-slot ' + posClass(offset);
    slot.setAttribute('role','option');
    slot.setAttribute('aria-selected', offset===0 ? 'true':'false');
    const isNext = offset > 0 && !c.locked && !c.solved;
    slot.innerHTML = cardHTML(c, isNext);

    if(offset !== 0){
      slot.addEventListener('click', ()=> navigate(offset > 0 ? 1 : -1));
    }

    const solveBtn = slot.querySelector('[data-solve]');
    if(solveBtn){
      const cardIdx = i;
      solveBtn.addEventListener('click', e=>{
        e.stopPropagation();
        cur = cardIdx;
        CASES[cur].solved = true;
        if(cur+1 < CASES.length) CASES[cur+1].locked = false;
        showToast('✔ Step solved!');
        renderCarousel();
        renderNav();
      });
    }

    if(offset === 0) slot.querySelector('.card').classList.add('card-enter');
    track.appendChild(slot);
  }
}

/* ══════════════════════════════════════
   NAVIGATE
══════════════════════════════════════ */
function navigate(dir){
  const next = cur + dir;
  if(next < 0 || next >= CASES.length || isAnimating) return;
  isAnimating = true;
  cur = next;
  renderCarousel();
  renderNav();
  setTimeout(()=>{ isAnimating = false; }, 380);
}

══════════════════════════════════════ */
function renderNav(){
  navStrip.innerHTML = '';
  const solvedCount = CASES.filter(c=>c.solved).length;
  const total = CASES.length;

  CASES.forEach((c,i)=>{
    const d = document.createElement('button');
    d.setAttribute('aria-label', `Step ${i+1}`);
    if(c.solved){
      d.className='ndot nd-solved'; d.innerHTML='✓';
    } else if(c.locked){
      d.className='ndot nd-locked'; d.innerHTML=iconLock(13);
      d.setAttribute('disabled','');
    } else if(i===cur){
      d.className='ndot nd-active';
    } else {
      d.className='ndot';
    }

    if(!c.locked){
      d.addEventListener('click',()=>{
        if(i===cur) return;
        cur = i;
        renderCarousel();
        renderNav();
      });
    }
    navStrip.appendChild(d);
  });

  progFill.style.width = (solvedCount / total * 100) + '%';
}

const MY_ID = Math.random().toString(36).slice(2);

const MAP_NATIVE_W = 3392, MAP_NATIVE_H = 4178;

// Shared map transform state — written by initImageMap, read by draw system
const mapState = { scale: 1, panX: 0, panY: 0 };

function screenToMapFrac(sx, sy){
  return {
    mx: (sx - mapState.panX) / mapState.scale / MAP_NATIVE_W,
    my: (sy - mapState.panY) / mapState.scale / MAP_NATIVE_H
  };
}
function mapFracToScreen(mx, my){
  return {
    x: mx * MAP_NATIVE_W * mapState.scale + mapState.panX,
    y: my * MAP_NATIVE_H * mapState.scale + mapState.panY
  };
}

function getPos(e){
  const rect = drawCanvas.getBoundingClientRect();
  return { x:(e.clientX-rect.left), y:(e.clientY-rect.top) };
}

function drawSegment(x0,y0,x1,y1,color,size,eraser){
  dctx.save();
  dctx.lineJoin = 'round';
  dctx.lineCap  = 'round';
  dctx.lineWidth = size;
  if(eraser){
    dctx.globalCompositeOperation = 'destination-out';
    dctx.strokeStyle = 'rgba(0,0,0,1)';
  }else{
    dctx.globalCompositeOperation = 'source-over';
    dctx.strokeStyle = color;
  }
  dctx.beginPath();
  dctx.moveTo(x0,y0);
  dctx.lineTo(x1,y1);
  dctx.stroke();
  dctx.restore();
}

function drawStroke(s, isLocal){
  const p0 = mapFracToScreen(s.mx0, s.my0);
  const p1 = mapFracToScreen(s.mx1, s.my1);
  drawSegment(p0.x, p0.y, p1.x, p1.y, s.color, s.size, s.eraser);
  strokes.push(s);
}

function redrawAllStrokes(){
  dctx.clearRect(0,0,drawCanvas.width, drawCanvas.height);
  strokes.forEach(s=>{
    const p0 = mapFracToScreen(s.mx0, s.my0);
    const p1 = mapFracToScreen(s.mx1, s.my1);
    drawSegment(p0.x, p0.y, p1.x, p1.y, s.color, s.size, s.eraser);
  });
}

let redrawScheduled = false;
function scheduleRedrawStrokes(){
  if(redrawScheduled) return;
  redrawScheduled = true;
  requestAnimationFrame(()=>{
    redrawScheduled = false;
    redrawAllStrokes();
  });
}

function clearCanvasLocal(){
  dctx.clearRect(0,0,drawCanvas.width, drawCanvas.height);
  strokes = [];
}

drawCanvas.addEventListener('pointerdown', (e)=>{
  if(!toolActive) return;
  drawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  drawCanvas.setPointerCapture(e.pointerId);
});

drawCanvas.addEventListener('pointermove', (e)=>{
  if(!drawing || !toolActive) return;
  const p = getPos(e);
  const eraser = tool === 'eraser';
  const size = eraser ? 26 : 5;
  drawSegment(lastX, lastY, p.x, p.y, drawColor, size, eraser);

  const m0 = screenToMapFrac(lastX, lastY);
  const m1 = screenToMapFrac(p.x, p.y);
  const stroke = {
    mx0: m0.mx, my0: m0.my, mx1: m1.mx, my1: m1.my,
    color: drawColor, size: size, eraser: eraser, from: MY_ID,
    t: Date.now()
  };
  strokes.push(stroke);
  if(fbReady && dbRef){
    dbRef.push(stroke);
  }
  lastX = p.x; lastY = p.y;
});

['pointerup','pointercancel','pointerleave'].forEach(ev=>{
  drawCanvas.addEventListener(ev, ()=>{ drawing = false; });
});

  const loadingDiv     = document.getElementById('pdf-loading');

  const MAP_SRC  = 'map.webp';
  const NATIVE_W = 3392;
  const NATIVE_H = 4178;

  // ─── state ───────────────────────────────────────────────
  // scale = CSS pixels per map pixel at zoom=1
  // panX/panY = CSS-pixel offset of map's top-left corner from viewport top-left
  let scale = 1;   // set by resetView()
  let panX  = 0;
  let panY  = 0;

  // ─── helpers ─────────────────────────────────────────────
  function mapW(){ return NATIVE_W * scale; }
  function mapH(){ return NATIVE_H * scale; }
  const W = ()=> window.innerWidth;
  const H = ()=> window.innerHeight;

  // Padding: how far the map can be dragged off-screen (px)
  const PAD_X = ()=> W() * 0.6;
  const PAD_Y = ()=> H() * 0.3;

  function clamp(){
    // X: left edge can go as far right as PAD_X, right edge as far left as W()-PAD_X
    panX = Math.min(PAD_X(), Math.max(W() - mapW() - PAD_X(), panX));
    // Y: same logic
    panY = Math.min(PAD_Y(), Math.max(H() - mapH() - PAD_Y(), panY));
  }

  function apply(){
    mapState.scale = scale;
    mapState.panX  = panX;
    mapState.panY  = panY;
    const t = `translate(${panX}px,${panY}px) scale(${scale})`;
    mapImage.style.transform       = t;
    mapPlaceholder.style.transform = t;
    scheduleRedrawStrokes();
  }

  function resetView(){
    // Fit map to screen width, center vertically
    scale = W() / NATIVE_W;
    panX  = 0;
    panY  = (H() - mapH()) / 2;
  }

  // ─── init ────────────────────────────────────────────────
  requestAnimationFrame(()=>{
    resetView();
    apply();
  });

  // ─── image load ──────────────────────────────────────────
  mapImage.addEventListener('load', ()=>{
    loadingDiv.style.display    = 'none';
    mapImage.classList.add('loaded');
    mapPlaceholder.style.opacity = '0';
  }, { once: true });

  mapImage.addEventListener('error', ()=>{
    loadingDiv.style.display    = 'none';
    mapPlaceholder.style.filter  = 'none';
    mapPlaceholder.style.opacity = '1';
  });

  mapImage.src = MAP_SRC;

  // ─── resize ──────────────────────────────────────────────
  window.addEventListener('resize', ()=>{
    resetView();
    apply();
  });

  // ─── MOUSE drag ──────────────────────────────────────────
  let mdragging = false, msx = 0, msy = 0, mpx = 0, mpy = 0;

  mapLayer.addEventListener('mousedown', e=>{
    if(toolActive) return;
    mdragging = true;
    msx = e.clientX; msy = e.clientY;
    mpx = panX;      mpy = panY;
  });
  window.addEventListener('mousemove', e=>{
    if(!mdragging) return;
    panX = mpx + (e.clientX - msx);
    panY = mpy + (e.clientY - msy);
    clamp(); apply();
  });
  window.addEventListener('mouseup', ()=>{ mdragging = false; });

  // ─── MOUSE wheel zoom ────────────────────────────────────
  mapLayer.addEventListener('wheel', e=>{
    e.preventDefault();
    const MIN_SCALE = W() / NATIVE_W * 0.5;
    const MAX_SCALE = W() / NATIVE_W * 10;
    const factor   = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    // zoom toward cursor
    panX = e.clientX - (e.clientX - panX) * (newScale / scale);
    panY = e.clientY - (e.clientY - panY) * (newScale / scale);
    scale = newScale;
    clamp(); apply();
  }, { passive: false });

  // ─── TOUCH pan & pinch ───────────────────────────────────
  let t0x = 0, t0y = 0, startPanX = 0, startPanY = 0;
  let prevMidX = 0, prevMidY = 0, prevDist = 1;

  mapLayer.addEventListener('touchstart', e=>{
    if(toolActive) return;
    const t = e.touches;
    if(t.length === 1){
      t0x = t[0].clientX; t0y = t[0].clientY;
      startPanX = panX;   startPanY = panY;
    }
    if(t.length === 2){
      prevDist = Math.hypot(t[1].clientX - t[0].clientX, t[1].clientY - t[0].clientY);
      prevMidX = (t[0].clientX + t[1].clientX) / 2;
      prevMidY = (t[0].clientY + t[1].clientY) / 2;
    }
  }, { passive: true });

  mapLayer.addEventListener('touchmove', e=>{
    if(toolActive) return;
    e.preventDefault();
    const t = e.touches;
    const MIN_SCALE = W() / NATIVE_W * 0.5;
    const MAX_SCALE = W() / NATIVE_W * 10;

    if(t.length === 1){
      panX = startPanX + (t[0].clientX - t0x);
      panY = startPanY + (t[0].clientY - t0y);
      clamp(); apply();
    }

    if(t.length === 2){
      const midX = (t[0].clientX + t[1].clientX) / 2;
      const midY = (t[0].clientY + t[1].clientY) / 2;
      const dist = Math.hypot(t[1].clientX - t[0].clientX, t[1].clientY - t[0].clientY);

      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * (dist / prevDist)));
      // zoom toward pinch midpoint
      panX = midX - (prevMidX - panX) * (newScale / scale);
      panY = midY - (prevMidY - panY) * (newScale / scale);
      scale = newScale;

      clamp(); apply();
      prevMidX = midX; prevMidY = midY; prevDist = dist;
    }
  }, { passive: false });
})();
</script>
</body>
</html>
